name: macOS & Electron Builds

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "clients/macos/**"
      - "clients/electron/**"
      - "clients/web/**"
      - ".github/workflows/macos-electron.yml"

jobs:
  # ── Native Swift macOS App ────────────────────────────────────
  swift-macos:
    name: Swift macOS App
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Swift package
        working-directory: clients/macos/PlayPalace
        run: swift build -c release

      - name: Run Swift tests (if any)
        working-directory: clients/macos/PlayPalace
        run: swift test || echo "No tests yet — skipping"

      - name: Install ffmpeg
        run: brew install ffmpeg

      - name: Assemble .app bundle
        working-directory: clients/macos/PlayPalace
        run: |
          BIN_DIR=$(swift build -c release --show-bin-path)
          APP="PlayPalace.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources/sounds"
          cp "$BIN_DIR/PlayPalace" "$APP/Contents/MacOS/PlayPalace"
          chmod +x "$APP/Contents/MacOS/PlayPalace"

          # Bundle sounds, converting OGG to CAF for AVAudioPlayer
          cp -R ../../../clients/desktop/sounds/* "$APP/Contents/Resources/sounds/"
          find "$APP/Contents/Resources/sounds" -name '*.ogg' | while IFS= read -r f; do
            out="${f%.ogg}.caf"
            ffmpeg -y -loglevel error -i "$f" -c pcm_s16le "$out" && rm "$f"
          done

          cat > "$APP/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>PlayPalace</string>
            <key>CFBundleDisplayName</key>
            <string>PlayPalace</string>
            <key>CFBundleIdentifier</key>
            <string>com.playpalace.macos</string>
            <key>CFBundleVersion</key>
            <string>11.0.0</string>
            <key>CFBundleShortVersionString</key>
            <string>11.0.0</string>
            <key>CFBundleExecutable</key>
            <string>PlayPalace</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>14.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>NSAccessibilityUsageDescription</key>
            <string>PlayPalace uses accessibility features to support VoiceOver and screen readers.</string>
          </dict>
          </plist>
          PLIST

          # Zip the .app for upload
          ditto -c -k --keepParent "$APP" PlayPalace.app.zip
          ls -lh PlayPalace.app.zip

      - name: Upload macOS app
        uses: actions/upload-artifact@v4
        with:
          name: playpalace-macos-swift
          path: clients/macos/PlayPalace/PlayPalace.app.zip

  # ── Electron – macOS ──────────────────────────────────────────
  electron-mac:
    name: Electron macOS
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: clients/electron
        run: npm install

      - name: Build macOS DMG
        working-directory: clients/electron
        run: npx electron-builder --mac --publish never

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: playpalace-electron-macos
          path: clients/electron/dist/*.dmg

  # ── Electron – Windows ────────────────────────────────────────
  electron-windows:
    name: Electron Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: clients/electron
        run: npm install

      - name: Build Windows installer
        working-directory: clients/electron
        run: npx electron-builder --win --publish never

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: playpalace-electron-windows
          path: clients/electron/dist/*.exe

  # ── Electron – Linux ──────────────────────────────────────────
  electron-linux:
    name: Electron Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: clients/electron
        run: npm install

      - name: Build Linux AppImage
        working-directory: clients/electron
        run: npx electron-builder --linux --publish never

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: playpalace-electron-linux
          path: clients/electron/dist/*.AppImage

  # ── Create Release ────────────────────────────────────────────
  release:
    name: Create Release
    needs: [swift-macos, electron-mac, electron-windows, electron-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v11.0.0-build.${{ github.run_number }}"
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "PlayPalace $TAG" \
            --notes "Automated build from commit ${{ github.sha }}.

          **Downloads:**
          - **PlayPalace.app.zip** — Native Swift macOS app (requires macOS 14+)
          - **PlayPalace-*.dmg** — Electron macOS app
          - **PlayPalace-Setup-*.exe** — Electron Windows installer
          - **PlayPalace-*.AppImage** — Electron Linux app" \
            artifacts/playpalace-macos-swift/* \
            artifacts/playpalace-electron-macos/* \
            artifacts/playpalace-electron-windows/* \
            artifacts/playpalace-electron-linux/*
